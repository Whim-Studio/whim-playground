<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whim Royale</title>
    <meta
      name="description"
      content="A minimal Whim-themed HTML5 canvas battle-royale game with a shrinking storm."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="scorebar" aria-label="Game stats">
        <div class="scorebar__stats">
          <span class="stat">
            <span class="stat__label">Eliminations</span>
            <strong id="score">00</strong>
          </span>
          <span class="stat">
            <span class="stat__label">Storm closing</span>
            <strong id="roundTime">00:00</strong>
          </span>
          <span class="stat">
            <span class="stat__label">Lives</span>
            <strong id="lives">&#9829;&#9829;&#9829;</strong>
          </span>
          <span class="stat">
            <span class="stat__label">Health</span>
            <div id="healthBar" class="health-bar" aria-label="Player health">
              <div class="health-bar__fill" id="healthBarFill"></div>
            </div>
          </span>
        </div>
      </header>

      <main class="game-shell" aria-label="Whim Royale game">
        <canvas
          id="gameCanvas"
          aria-label="Whim Royale canvas. Move with arrow keys, pointer drag, or touch. Press Space to shoot. Stay inside the storm's safe zone."
        ></canvas>
        <button
          id="shootButton"
          class="shoot-button"
          type="button"
          aria-label="Shoot"
        >
          <span aria-hidden="true"></span>
        </button>
        <div id="gameOverlay" class="game-overlay" hidden>
          <div class="game-overlay__panel">
            <span id="overlayEyebrow" class="game-overlay__eyebrow">Drop in</span>
            <strong id="overlayTitle">Whim Royale</strong>
            <p id="overlayCopy" class="game-overlay__copy">
              Move with arrow keys or drag, Space to fire. Stay inside the eye
              of the storm and outlast it for the Victory Royale.
            </p>
            <button id="restartButton" type="button">Drop in</button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
